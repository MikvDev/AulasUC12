<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
   <link rel="shortcut icon" href="/Dia22-04/assets/images/16x16.png" type="image/x-icon">
    <title>Stardew Valley Quiz</title>
</head>
<body>

<main>
    <div id="container-card">
    <div id="card">
        <h1>Quiz Stardew Valley</h1>
        <p id="pontuação">o</p>
        <div class="quiz-question active">
            <p>Quem te entrega a fazenda no começo do jogo?</p>
            <button class="option">A) Lewis</button>
            <button class="option correct">B) Seu avô</button>
            <button class="option">C) Robin</button>
            <button class="option">D) Wizard</button>
        </div>

        <div class="quiz-question">
            <p>Qual o nome do cavalo padrão do jogo?</p>
            <button class="option">A) Epona</button>
            <button class="option">B) Rapidash</button>
            <button class="option">C) O jogo não dá nome padrão</button>
            <button class="option correct">D) Grover</button>
        </div>
          <div class="quiz-question">
            <p>Qual é o nome do personagem que mora em uma tenda?</p>
            <button class="option correct">A) Linus</button>
            <button class="option">B) Robin</button>
            <button class="option">C) Pam</button>
            <button class="option correct">D) ninguém </button>
        </div>
          <div class="quiz-question">
            <p>Qual é o evento que podemos peagr uma perola?</p>
            <button class="option correct">A) Mercado noturno</button>
            <button class="option">B) Festa das Flores</button>
            <button class="option">C) Natal</button>
            <button class="option">D) Hallowen</button>
        </div>
          <div class="quiz-question">
            <p>De qual personagem o prefeito gosta?</p>
            <button class="option">A) Pam</button>
            <button class="option correct">B) Mernie</button>
            <button class="option">C) Gus</button>
            <button class="option">D) Epona</button>
        </div>
          <div class="quiz-question">
            <p>Parae?</p>
            <button class="option">A) Epona</button>
            <button class="option">B) Rapidash</button>
            <button class="option">C) O jogo não dá nome padrão</button>
            <button class="option correct">D) Grover</button>
        </div>
    </div>
</div>
</main>
<script src="/Dia22-04/assets/js/script.js"></script>
</body>
</html>
